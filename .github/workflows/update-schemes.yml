name: Update government schemes

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-schemes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh myScheme catalog
        run: npm run update:schemes

      - name: Verify build
        run: npm run build

      - name: Commit updated scheme feed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update government scheme feed'
          file_pattern: public/generated-government-schemes.json
